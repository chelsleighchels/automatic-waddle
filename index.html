<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>YWAM Ensenada 2026 – Fundraising Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#D880AA;--coral-light:#FAE8F2;--coral-dark:#9A4A7A;
  --sky:#38C4E7;--sky-light:#D8F4FC;--sky-dark:#1A90B0;
  --gold:#218A9B;--gold-light:#D6EEF2;--gold-dark:#0F5060;
  --blush:#FADCE8;--blush-pale:#FDE7C2;
  --navy:#1A2B47;--navy-mid:#2D4468;
  --white:#FFFFFF;--text:#2D3748;--text-mid:#4A5568;--text-light:#718096;
  --radius:14px;--shadow:0 2px 12px rgba(26,43,71,0.08);
}
body{font-family:'Inter',sans-serif;background:var(--blush-pale);color:var(--text);min-height:100vh}
.site-banner{width:100%;display:block;line-height:0}
.site-banner img{width:100%;height:auto;display:block}
header{background:var(--navy);padding:36px 40px 32px;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 60%,rgba(217,95,74,.25) 0%,transparent 55%),radial-gradient(ellipse at 80% 30%,rgba(75,168,192,.2) 0%,transparent 50%);pointer-events:none}
.header-eyebrow{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--blush);margin-bottom:10px;position:relative}
header h1{font-family:'Playfair Display',serif;font-size:clamp(24px,4vw,40px);color:var(--white);position:relative;margin-bottom:8px}
.header-verse{font-size:13px;color:rgba(255,255,255,.5);font-style:italic;position:relative;margin-bottom:24px}
.header-pills{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;position:relative}
.pill{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:40px;padding:6px 16px;font-size:12px;font-weight:500;color:rgba(255,255,255,.8)}
.pill strong{color:var(--white)}

/* Summary strip */
.summary-strip{background:var(--white);border-bottom:1px solid rgba(0,0,0,.06);padding:16px 40px;display:flex;gap:0;overflow-x:auto;justify-content:center}
.sum-stat{padding:6px 24px;border-right:1px solid #E2E8F0;text-align:center;white-space:nowrap}
.sum-stat:last-child{border-right:none}
.sum-stat .val{font-size:20px;font-weight:700;color:var(--navy)}
.sum-stat .lbl{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);margin-top:2px}

/* Controls */
.controls{padding:20px 40px 0;display:flex;gap:12px;flex-wrap:wrap;background:var(--blush-pale)}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap input{width:100%;padding:10px 16px 10px 38px;border:1.5px solid #E2E8F0;border-radius:10px;font-size:14px;background:var(--white);color:var(--text);outline:none;transition:border .2s}
.search-wrap input:focus{border-color:var(--coral)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:15px}
.ctrl-btn{padding:10px 16px;border:1.5px solid #E2E8F0;border-radius:10px;background:var(--white);color:var(--text-mid);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.ctrl-btn.active{border-color:var(--coral);color:var(--coral);background:var(--coral-light)}

/* Campus section */
.campus-section{margin:28px 40px 0}
.campus-header{border-radius:var(--radius) var(--radius) 0 0;padding:20px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.campus-badge{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--white);background:rgba(255,255,255,.25);border-radius:20px;padding:4px 12px}
.campus-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--white)}
.campus-stats-row{margin-left:auto;display:flex;gap:16px;align-items:center}
.campus-stat{text-align:right;color:var(--white)}
.campus-stat .v{font-size:16px;font-weight:700}
.campus-stat .l{font-size:10px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.campus-bar-wrap{height:6px;background:rgba(0,0,0,.15);border-radius:3px;margin:0 24px;overflow:hidden}
.campus-bar{height:100%;background:rgba(255,255,255,.7);border-radius:3px;transition:width 1s ease}
.over-goal-badge{background:rgba(255,255,255,0.9);color:#1A2B47;font-size:11px;font-weight:800;border-radius:20px;padding:4px 12px;letter-spacing:0.5px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.campus-overflow-notice{background:rgba(255,255,255,.85);border-top:1px solid rgba(0,0,0,.08);padding:10px 24px;font-size:12px;color:#1A2B47;font-weight:500;display:flex;align-items:center;gap:6px}

/* Cards grid */
.campus-body{background:var(--white);border-radius:0 0 var(--radius) var(--radius);padding:20px;box-shadow:var(--shadow)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}

/* Student card */
.card{background:var(--blush-pale);border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s;position:relative;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,43,71,.12)}
.card-accent{height:4px;width:100%}
.card-body{padding:14px 16px;flex:1}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--white);flex-shrink:0}
.card-name{font-size:15px;font-weight:700;color:var(--navy);line-height:1.2}
.card-campus{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-top:1px}
.card-amounts{display:flex;justify-content:space-between;margin-bottom:8px}
.amount-raised{font-size:18px;font-weight:700;color:var(--navy)}
.amount-owed{font-size:12px;color:var(--text-light);text-align:right;padding-top:2px}
.amount-owed.zero{color:#48BB78;font-weight:600}
.prog-track{height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;margin-bottom:10px}
.prog-fill{height:100%;border-radius:3px;transition:width 1s ease}
.personal-raised{font-size:11px;color:var(--text-light);margin-bottom:8px;font-style:italic}
.donor-count{font-size:11px;color:var(--text-light)}
.funded-badge{display:inline-flex;align-items:center;gap:4px;background:#C6F6D5;color:#276749;font-size:11px;font-weight:700;border-radius:20px;padding:3px 10px;margin-bottom:6px}
.card-actions{display:flex;gap:8px;padding:10px 16px 14px}
.btn-donors{flex:1;padding:9px 12px;border-radius:9px;border:1.5px solid #E2E8F0;background:var(--white);color:var(--text-mid);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-donors:hover{border-color:var(--navy);color:var(--navy)}
.btn-donors.open{background:var(--navy);color:var(--white);border-color:var(--navy)}
.btn-give{flex:1;padding:9px 12px;border-radius:9px;border:none;color:var(--white);font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;text-align:center;display:flex;align-items:center;justify-content:center;gap:5px;transition:opacity .2s}
.btn-give:hover{opacity:.85}
/* Donor dropdown */
.donor-dropdown{display:none;border-top:1px solid #F0F0F0;background:var(--white);max-height:280px;overflow-y:auto}
.donor-dropdown.open{display:block}
.dd-header{display:flex;justify-content:space-between;padding:8px 14px 4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-light);border-bottom:1px solid #F0F0F0}
.dd-row{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid #FAFAFA;gap:8px}
.dd-row:last-child{border-bottom:none}
.dd-row.campus-fund{background:#D6EEF2}
.dd-name{font-size:12px;color:var(--text);font-weight:500;flex:1;min-width:0}
.dd-source{font-size:10px;color:var(--text-light);margin-top:1px}
.dd-right{display:flex;flex-direction:column;align-items:flex-end;gap:1px;flex-shrink:0}
.dd-amt{font-size:12px;font-weight:700;color:var(--navy)}
.dd-date{font-size:10px;color:var(--text-light)}
.dd-empty{padding:12px 14px;font-size:12px;color:var(--text-light);font-style:italic}

/* Staff row */
.staff-section{margin:20px 40px 0}
.staff-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:12px;padding:0 4px}
.staff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.staff-card{background:var(--white);border-radius:12px;border:2px solid #E2E8F0;overflow:hidden}
.staff-card .card-body{padding:14px 16px}


/* Utility */
.hidden{display:none!important}
.camp-sr .card-accent,.camp-sr .prog-fill,.camp-sr .avatar{background:var(--sky)!important}
.camp-sr .campus-header{background:var(--sky)}
.camp-lv .card-accent,.camp-lv .prog-fill,.camp-lv .avatar{background:var(--coral)!important}
.camp-lv .campus-header{background:var(--coral)}
.camp-wc .card-accent,.camp-wc .prog-fill,.camp-wc .avatar{background:var(--gold)!important}
.camp-wc .campus-header{background:var(--gold)}
.camp-wc .campus-name,.camp-wc .campus-badge,.camp-wc .campus-stat .v,.camp-wc .campus-stat .l,.camp-wc .over-goal-badge{background:rgba(255,255,255,0.9);color:#1A2B47;font-size:11px;font-weight:800;border-radius:20px;padding:4px 12px;letter-spacing:0.5px;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,0.15)}
.campus-overflow-notice{color:var(--navy)!important}

@media(max-width:640px){
  .controls,.campus-section,.staff-section{margin-left:16px;margin-right:16px}
  .summary-strip{padding:12px 16px;justify-content:flex-start}
  .sum-stat{padding:4px 14px}
  header{padding:28px 20px 24px}
  .campus-stats-row{display:none}
}

  /* ── Top Navigation ── */
  .top-nav{background:var(--navy);border-bottom:1px solid rgba(255,255,255,.08);padding:0 40px;display:flex;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:50}
  .top-nav::-webkit-scrollbar{display:none}
  .nav-btn{padding:14px 18px;font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.55);background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:'Inter',sans-serif}
  .nav-btn:hover{color:rgba(255,255,255,.85)}
  .nav-btn.active{color:var(--white);border-bottom-color:var(--sky)}

  /* ── Info Pages ── */
  .info-page{display:none;padding:40px;max-width:900px;margin:0 auto;animation:fadeIn .3s ease}
  .info-page.active{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fundraising-view{display:block}
  .fundraising-view.hidden{display:none}

  .page-hero{background:linear-gradient(135deg,var(--navy) 0%,#2D4468 100%);border-radius:16px;padding:36px 40px;margin-bottom:32px;position:relative;overflow:hidden}
  .page-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 50%,rgba(75,168,192,.2),transparent 60%);pointer-events:none}
  .page-hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--sky);margin-bottom:8px}
  .page-hero h2{font-family:'Playfair Display',serif;font-size:clamp(22px,3vw,32px);color:var(--white);margin-bottom:8px}
  .page-hero p{font-size:14px;color:rgba(255,255,255,.6);max-width:600px;line-height:1.6}

  .info-section{background:var(--white);border-radius:14px;padding:28px 32px;margin-bottom:20px;box-shadow:0 2px 12px rgba(26,43,71,.06)}
  .info-section h3{font-size:15px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .info-section h3 .icon{font-size:18px}
  .info-section p,.info-section li{font-size:13.5px;color:#4A5568;line-height:1.7}
  .info-section ul{padding-left:18px;display:flex;flex-direction:column;gap:6px}
  .info-section li{list-style:disc}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:640px){.info-grid{grid-template-columns:1fr}.info-page{padding:20px}.top-nav{padding:0 16px}}

  /* Flight cards */
  .flight-card{background:linear-gradient(135deg,var(--navy),#2D4468);border-radius:14px;padding:24px 28px;color:var(--white);margin-bottom:16px}
  .flight-card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
  .flight-label{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--sky)}
  .flight-num{font-size:22px;font-weight:800;color:var(--white)}
  .flight-route{display:flex;align-items:center;gap:16px}
  .flight-city{text-align:center}
  .flight-time{font-size:26px;font-weight:800;line-height:1}
  .flight-code{font-size:11px;font-weight:600;letter-spacing:2px;color:rgba(255,255,255,.6);margin-top:4px}
  .flight-city-name{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px}
  .flight-arrow{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .flight-line{height:1px;width:100%;background:rgba(255,255,255,.2);position:relative}
  .flight-line::after{content:'✈';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:14px;background:var(--navy);padding:0 8px}
  .flight-duration{font-size:11px;color:rgba(255,255,255,.5)}
  .flight-date{font-size:12px;color:rgba(255,255,255,.5);margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.1)}

  /* Family cards */
  .family-card{background:var(--white);border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(26,43,71,.08);margin-bottom:20px}
  .family-card-header{background:linear-gradient(135deg,var(--navy),#2D4468);padding:20px 24px;display:flex;align-items:center;gap:14px}
  .family-name{font-family:'Playfair Display',serif;font-size:20px;color:var(--white)}
  .family-subtitle{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
  .family-body{padding:24px}
  .family-table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:13px}
  .family-table th{background:#F7FAFC;padding:8px 12px;text-align:left;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text-light);border-bottom:2px solid #E2E8F0}
  .family-table td{padding:10px 12px;border-bottom:1px solid #F0F0F0;color:var(--text)}
  .family-table tr:last-child td{border-bottom:none}
  .family-story{font-size:13.5px;color:#4A5568;line-height:1.8;background:#F7FAFC;border-radius:10px;padding:18px 20px;border-left:4px solid var(--sky)}
  .prop-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  .prop-badge{background:#EDF2F7;border-radius:8px;padding:8px 14px;font-size:12px;color:var(--navy);font-weight:600}
  .prop-badge span{color:var(--text-light);font-weight:400;margin-left:4px}

  /* Alert box */
  .alert-box{border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;gap:12px;align-items:flex-start;font-size:13.5px;line-height:1.6}
  .alert-box.warning{background:#FFFBEB;border:1px solid #F59E0B;color:#92400E}
  .alert-box.info{background:#EFF6FF;border:1px solid #3B82F6;color:#1E40AF}
  .alert-box.success{background:#F0FDF4;border:1px solid #22C55E;color:#166534}
  .alert-icon{font-size:18px;flex-shrink:0;margin-top:1px}

</style>
</head>
